<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/home.css" /> 
</head>

<body>
  <div id="bubble-container"></div> 

  <main class="landing-layout">
    <header class="top-banner">
      <h1>{{ site.data.profile.profile.name }}</h1>
      <h2>{{ site.data.profile.profile.title }}</h2>
    </header>

    <div class="profile-photo">
      <img src="{{ site.data.profile.profile.photo }}" alt="Photo de {{ site.data.profile.profile.name }}">
    </div>

    <div class="project-carousel">
      <h1 class="title">Projects Overview</h1>

      <div class="carousel">
        <div class="carousel-track">
          {% for item in site.data.profile.carousel_images %}
            <img src="{{ item.src }}" alt="{{ item.alt }}">
          {% endfor %}
          
          {% for item in site.data.profile.carousel_images %}
            <img src="{{ item.src }}" alt="{{ item.alt }}">
          {% endfor %}
        </div>
      </div>
    </div>
  </main>

   {% include menu.html %}
  <script src="assets/js/bubble_script.js"></script>
</body>
</html>
