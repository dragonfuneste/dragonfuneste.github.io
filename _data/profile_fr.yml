  citation: "Deviens qui tu es, et sois ce que toi seul peux être. — Friedrich Nietzsche"
  motivation : "Passionné par les nouvelles technologies. Mon parcours a suscité un fort intérêt pour l’électronique, qui m’a ensuite conduit vers la robotique. Je cherche aujourd’hui à faire de l’un de ces deux domaines mon axe principal de carrière."
  
  summary_engineering: "Ingénieur en systèmes embarqués et robotique avec une expertise en conception de PCB (Altium/KiCad) et systèmes autonomes (ROS2). Expérience avérée en prototypage rapide, de l’automatisation industrielle aux algorithmes de motorisation, avec un fort accent sur l’intégration matériel-logiciel."
  summary_academic: "À la recherche d’un doctorat dans un domaine matériel ou électronique. Intéressé particulièrement par la microélectronique, la conception hardware et l’intersection entre hardware et IA. Mon objectif est de contribuer à la recherche de pointe tout en exploitant mon profil d’ingénieur pour faire le lien entre théorie et applications pratiques."

