favorite_art:
  Demain_des_l_aube :
    autor : "Victor Hugo"
    type : "poem"
    reason : "It is the first poem I learn by heart, I still know some verse. And it was to talk about the death. It so sad and also so, well written. It was the first time in my life I cried for art"
    link : "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTUUNTa4J2k3R8uV_MEdvv2KM5tXARooTZtiQ&s"
  Nightmare_Before_Christmas:
    autor: "Tim Burton"
    type: "film"
    reason: "Because it was the first Disney where the villain wins. Jack is actually the one messing up Christmas, and he regrets nothing, so for me he is the villain. Also, I love the visual style of this film."
    link: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTt_CSGDrOxkB4s62faGEj_ra2uJ6YPinEqgBk9HZ2nD8scr7JW"
  Les_Miserables:
    autor: "Victor Hugo"
    type: "book"
    reason: "This book made me realize that even the worst person can be redeemed and that stories are about human struggle, not just heroes and villains."
    link: "https://m.media-amazon.com/images/I/81e1NPAQJmL._AC_UF1000,1000_QL80_.jpg"
  Marie_Curie:
    autor: "Marie Curie"
    type: "scientist"
    reason: "I am a huge fan of Marie Curie. She represents the most famous woman in science. Her story made me realize the historical unfairness towards women and reinforced my belief that everyone should be equal and respected."
    link: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Marie_Curie_c._1920s.jpg/960px-Marie_Curie_c._1920s.jpg"
  Leonardo_Da_Vinci:
    autor: "Leonardo Da Vinci"
    type: "scientist, artist, ingeneering, virtuoso"
    reason: "It was literaly because of him that I wanted to become an Ingeener. When I was a child I saw Il etait une fois la vie series and they was the scientist who was design from him. And I loved this guys I love the idea of curiosity trying to find things and all. "
    link: "https://hips.hearstapps.com/hmg-prod/images/portrait-of-leonardo-da-vinci-1452-1519-getty.jpg"
  Beyond_Good_and_Evil:
    autor: "Friedrich Nietzsche"
    type: "book"
    reason: "A nightmare to understand at first, but it changed my life completely. It made me reflect on my actions and heritage."
    link: "https://m.media-amazon.com/images/I/71DOYQ78OUL._AC_UF1000,1000_QL80_.jpg"
  Starry_Night:
    autor: "Van Gogh"
    type: "painting"
    reason: "A beautiful feeling of emptiness. It represents the raw beauty of humanity in art."
    link: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg"
  Frida_Kahlo :
    autor: " "
    type: "painter"
    reason: "I love the painting of this artist, and how she represent herself on all of her painting"
    link: "https://upload.wikimedia.org/wikipedia/commons/0/06/Frida_Kahlo%2C_by_Guillermo_Kahlo.jpg"
  Wanderer_above_the_Sea_of_Fog:
    autor: "Caspar David Friedrich"
    type: "painting"
    reason: "Represents freedom, dreams, and the fear of novelty."
    link: "https://i.pinimg.com/736x/51/dd/58/51dd5851ff1b803bdd00c769af34a2f6.jpg"
  One_Piece:
    autor: "Eiichiro Oda"
    type: "anime"
    reason: "The world-building is incredible. I admire the dedication of the author over the years."
    link: "https://m.media-amazon.com/images/S/pv-target-images/1595dc2f5bd3654d3d263b4fce60780b118bb31ee3af7a9dc9c99f89ba415934._SX1080_FMjpg_.jpg"
