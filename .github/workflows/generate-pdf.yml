name: Generate CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'about.html'

jobs:
  convert_to_pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Mise à jour pour 2026

      - name: Install Dependencies
        run: |
          npm install puppeteer
          # On s'assure que Chrome est bien installé pour Puppeteer
          npx puppeteer browsers install chrome

      - name: Generate PDF
        run: |
          node -e "const puppeteer = require('puppeteer'); (async () => {
            const browser = await puppeteer.launch({ 
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            await page.goto('file://' + process.cwd() + '/about.html', {waitUntil: 'networkidle0'});
            
            await page.addStyleTag({content: \`
              @page { size: A4; margin: 1cm; }
              body { background: white !important; color: black !important; }
              .about-container { margin: 0 !important; max-width: 100% !important; }
              .cv-header { background: #f4f4f4 !important; border-bottom: 2px solid black !important; color: black !important; }
              h1, .section-title, .cv-item-title { color: black !important; }
              .glass-card { background: white !important; border: 1px solid #ddd !important; }
              .bottom-menu, #bubble-container, .pdf-download, .contact-form-section { display: none !important; }
            \`});

            await page.pdf({
              path: 'CV_Loubet_Bonino_Gregory.pdf',
              format: 'A4',
              printBackground: true
            });
            await browser.close();
          })();"

      - name: Commit and Push PDF
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add CV_Loubet_Bonino_Gregory.pdf
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update CV PDF [skip ci]"
            git push
          fi