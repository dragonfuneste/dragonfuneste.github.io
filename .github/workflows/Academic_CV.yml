name: Generate CV Academic
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyYAML Jinja2

      - name: Generate TeX files (ENG & FR)
        run: python generate_Academic.py

      - name: Compile LaTeX (English)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_academic_eng.tex

      - name: Compile LaTeX (French)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_academic_fr.tex

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CV_Academic_Pack
          path: |
            cv_academic_eng.pdf
            cv_academic_fr.pdf