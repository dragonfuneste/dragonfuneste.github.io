name: Generate Multi-Style CVs

on:
  push:
    branches:
      - main
    paths:
      - '_data/profileV2.yml'
      - 'templates/**'
      - 'generate.py'
  workflow_dispatch: # Permet de lancer la génération manuellement

jobs:
  build_cvs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install pyyaml jinja2

      - name: Install TeX Live (for Academic CV)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-lang-french

      - name: Install Playwright (for Engineering CV - HTML to PDF)
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Generation Script
        run: python generate.py

      - name: Compile LaTeX to PDF
        run: |
          pdflatex -interaction=nonstopmode cv_academic.tex
          # On le lance deux fois pour les références/index si besoin
          pdflatex -interaction=nonstopmode cv_academic.tex


      - name: Upload Generated CVs
        uses: actions/upload-artifact@v4
        with:
          name: Gregory_CVs
          path: |
            cv_academic.pdf


      - name: Deploy to Releases (Optional)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cv_academic.pdf
            CV_Gregory_Engineering.pdf
          tag_name: latest-cv
          name: Latest Generated CVs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}