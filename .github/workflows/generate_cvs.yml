name: Generate CV
on:
  push:
    branches: [ main ]
    paths:
      - '_data/profileV2.yml'
      - 'templates/academic.tex'

jobs:
  build_cv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # <--- Cache automatique des dépendances

      - name: Install dependencies
        run: pip install PyYAML Jinja2

      - name: Generate TeX file
        run: python generate.py

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3 # <--- Utilise l'image Docker pré-buildée
        with:
          root_file: cv_academic.tex
          # On évite de télécharger des packages inutiles
          latexmk_use_lualatex: false 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV_Academic
          path: cv_academic.pdf