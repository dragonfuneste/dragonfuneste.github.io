<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repository – Loubet-Bonino Grégory</title>
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/home.css">

  <style>
    :root { --pink-base: #ff69b4; }
    body { background-color: #0b0b0b; overflow-y: auto !important; }

    .repo-container {
      padding: 40px;
      max-width: 1200px;
      margin: 80px auto 100px auto;
      position: relative;
      z-index: 10;
    }

    .section-title {
      color: var(--pink-base);
      border-bottom: 2px solid var(--pink-base);
      padding-bottom: 10px;
      margin-top: 60px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* --- Stats Dashboard --- */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .stat-item {
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid var(--pink-base);
      padding: 20px;
      border-radius: 4px;
      text-align: center;
      backdrop-filter: blur(5px);
    }
    .stat-value {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--pink-base);
    }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }

    /* --- Commit Graph --- */
    .graph-container {
      margin-top: 25px;
      background: rgba(255, 255, 255, 0.03);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 105, 180, 0.2);
      text-align: center;
    }
    .graph-container img { max-width: 100%; height: auto; }

    /* --- Repos Grid --- */
    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }
    .repo-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 105, 180, 0.2);
      padding: 25px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }
    .repo-card:hover {
      border-color: var(--pink-base);
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.2);
      transform: translateY(-5px);
    }
    .repo-card h3 { color: var(--pink-base); margin-top: 0; }

    /* --- Network & Associations (WITH IMAGES) --- */
    .flex-list { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 25px; }
    
    .profile-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.08);
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid var(--pink-base);
      color: white;
      text-decoration: none;
      transition: 0.3s;
      cursor: pointer;
    }
    .profile-item:hover {
      background: var(--pink-base);
      color: black;
    }
    .profile-item img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      background: #333; /* Fallback si image manquante */
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9); z-index: 10000;
      justify-content: center; align-items: center;
      backdrop-filter: blur(10px);
    }
    .modal-content {
      background: #111; border: 2px solid var(--pink-base);
      padding: 40px; border-radius: 20px; max-width: 500px; text-align: center;
    }
  </style>
</head>
<body>

  <div id="bubble-container"></div>

  <div class="repo-container">
    
    <h2 class="section-title">GitHub Analytics</h2>
    
    <div class="stats-bar">
      <div class="stat-item">
        <span id="stat-repos" class="stat-value">--</span>
        <span class="stat-label">Repositories</span>
      </div>
      <div class="stat-item">
        <span id="stat-stars" class="stat-value">--</span>
        <span class="stat-label">Total Stars</span>
      </div>
      <div class="stat-item">
        <span id="stat-lang" class="stat-value" style="font-size: 1.1rem;">--</span>
        <span class="stat-label">Main Language</span>
      </div>
      <div class="stat-item">
        <span id="stat-best" class="stat-value" style="font-size: 1rem;">--</span>
        <span class="stat-label">Top Project</span>
      </div>
    </div>

    <div class="graph-container">
      <img src="https://github-readme-activity-graph.vercel.app/graph?username=dragonfuneste&bg_color=0b0b0b&color=ff69b4&line=ff69b4&point=ffffff&area=true&hide_border=true" alt="Contribution Graph">
    </div>

    <h2 class="section-title">Associations</h2>
    <div class="flex-list" id="assoc-list">
      <div class="profile-item" onclick="openAsso('pt-robotique')">
        <img src="assets/image/myself/logo_P&T.png" alt="P&T">
        <span>P&T Robotics</span>
      </div>
    </div>

    <h2 class="section-title">Latest Projects</h2>
    <div id="github-repos" class="repo-grid"></div>

    <h2 class="section-title">Network</h2>
    <div id="github-following" class="flex-list"></div>

  </div>

  <div id="asso-modal" class="modal-overlay" onclick="closeAsso()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="color: var(--pink-base);"></h3>
      <p id="modal-desc" style="color: white; line-height: 1.6;"></p>
    </div>
  </div>

  <footer class="bottom-menu">
    <a href="index.html" class="menu-box">Home</a>
    <a href="about.html" class="menu-box">About Me</a>
    <a href="research.html" class="menu-box">Research</a>
    <a href="projects.html" class="menu-box">Projects</a>
    <a href="contact.html" class="menu-box">Contact</a>
  </footer>

  <script src="assets/js/script.js"></script>

  <script>
    const GITHUB_USER = 'dragonfuneste';

    const assoData = {
      'pt-robotique': {
        title: "P&T Robotics",
        desc: "P&T Robotics is the historical robotics association of Télécom Saint-Étienne. We focus on building autonomous robots for national competitions."
      }
    };

    async function loadData() {
      try {
        // 1. Infos utilisateur
        const uReq = await fetch(`https://api.github.com/users/${GITHUB_USER}`);
        const u = await uReq.json();
        document.getElementById('stat-repos').textContent = u.public_repos;

        // 2. Repos et Stats détaillées
        const rReq = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=updated`);
        const repos = await rReq.json();
        
        let stars = 0, langs = {}, best = {name: "-", s: -1};

        repos.forEach(r => {
          stars += r.stargazers_count;
          if(r.stargazers_count > best.s) best = {name: r.name, s: r.stargazers_count};
          if(r.language) langs[r.language] = (langs[r.language] || 0) + 1;
        });

        const topL = Object.keys(langs).reduce((a, b) => langs[a] > langs[b] ? a : b, "N/A");
        
        document.getElementById('stat-stars').textContent = stars;
        document.getElementById('stat-lang').textContent = topL;
        document.getElementById('stat-best').textContent = best.name;

        // Affichage des cartes repos
        const grid = document.getElementById('github-repos');
        repos.filter(r => !r.fork).slice(0, 9).forEach(r => {
          grid.innerHTML += `
            <a href="${r.html_url}" target="_blank" class="repo-card">
              <h3>${r.name}</h3>
              <p>${r.description || "Research & development project."}</p>
              <span class="repo-lang"># ${r.language || "System"}</span>
            </a>`;
        });

        // 3. Following (Network) avec images
        const fReq = await fetch(`https://api.github.com/users/${GITHUB_USER}/following?per_page=30`);
        const following = await fReq.json();
        const fList = document.getElementById('github-following');
        fList.innerHTML = following.map(u => `
          <a href="${u.html_url}" target="_blank" class="profile-item">
            <img src="${u.avatar_url}" alt="${u.login}">
            <span>${u.login}</span>
          </a>`).join('');

      } catch (e) { console.error(e); }
    }

    function openAsso(id) {
      document.getElementById('modal-title').textContent = assoData[id].title;
      document.getElementById('modal-desc').textContent = assoData[id].desc;
      document.getElementById('asso-modal').style.display = 'flex';
    }
    function closeAsso() { document.getElementById('asso-modal').style.display = 'none'; }

    loadData();
  </script>
</body>
</html>
